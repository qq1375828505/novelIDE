name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        channel: 'stable'

    - name: Get version from pubspec.yaml
      id: get_version
      run: |
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | sed 's/+.*//g' | tr -d ' ')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Install dependencies
      run: flutter pub get

    - name: Generate code (build_runner)
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK
      run: cp build/app/outputs/flutter-apk/app-release.apk novel-ide-android-v${{ steps.get_version.outputs.VERSION }}.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: novel-ide-android-v${{ steps.get_version.outputs.VERSION }}.apk

    # 自动更新 README 中的版本号和下载链接
    - name: Auto Update README
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        echo "Updating README to version $VERSION"
        
        # 更新版本号和下载链接（使用 sed 替换）
        sed -i "s/V[0-9]\+\.[0-9]\+\.[0-9]\+/V$VERSION/g" README.md
        sed -i "s|releases/download/v[0-9]\+\.[0-9]\+\.[0-9]\+/|releases/download/v$VERSION/|g" README.md
        sed -i "s|novel-ide-android-v[0-9]\+\.[0-9]\+\.[0-9]\+\.apk|novel-ide-android-v$VERSION.apk|g" README.md
        
        # 检查是否有修改
        if git diff --quiet README.md; then
          echo "README already up to date"
        else
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto update README to v$VERSION [skip ci]"
          git push
        fi

    # 自动创建 Release 并上传 APK（仅 master 分支 push，非 PR）
    - name: Auto Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.get_version.outputs.VERSION }}"
        name: "V${{ steps.get_version.outputs.VERSION }}"
        body: |
          ## V${{ steps.get_version.outputs.VERSION }} 自动构建版本

          **构建信息**：
          - 版本号: V${{ steps.get_version.outputs.VERSION }}
          - 构建编号: #${{ github.run_number }}
          - 提交: ${{ github.sha }}
          - 触发者: ${{ github.actor }}
          - 时间: ${{ github.event.head_commit.timestamp }}

          **安装说明**：支持 Android 6.0+，下载 APK 后直接安装即可。
        files: novel-ide-android-v${{ steps.get_version.outputs.VERSION }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
