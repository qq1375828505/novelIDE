name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Generate code (build_runner)
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK
      run: cp build/app/outputs/flutter-apk/app-release.apk novel-ide-android.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: novel-ide-android.apk

    # 自动创建/更新 Release 并上传 APK（仅 main/master 分支 push，非 PR）
    - name: Auto Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "latest"
        name: "最新版本"
        body: |
          ## 网文写作IDE Android 最新版

          **安装说明**：支持 Android 6.0+，下载 APK 后直接安装即可。
        files: novel-ide-android.apk
        # 强制覆盖已存在的文件
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
